# 罐头里的诗人 - API接口定义
# 各模块间接口规范
# 版本：1.0.0

openapi: 3.0.0
info:
  title: 罐头里的诗人 - 内部API
  description: 感知层/记忆层/情绪层/表达层之间的接口定义
  version: 1.0.0

# ============================================================
# 感知层 (Perception Layer)
# ============================================================

paths:
  /perception/current:
    get:
      summary: 获取当前感知状态
      description: 返回当前所有感知维度的最新状态
      operationId: getCurrentPerception
      tags: [感知层]
      responses:
        '200':
          description: 当前感知状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerceptionState'

  /perception/photo/analyze:
    post:
      summary: 分析照片
      description: 对用户分享的照片进行特征提取和情绪映射
      operationId: analyzePhoto
      tags: [感知层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_data:
                  type: string
                  format: binary
                  description: 照片二进制数据（内存中处理，不存储）
                source:
                  type: string
                  enum: [camera, gallery, share]
                  description: 照片来源
      responses:
        '200':
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoAnalysis'

  /perception/location:
    get:
      summary: 获取当前位置语义
      description: 返回当前位置的语义信息（非精确坐标）
      operationId: getLocationSemantics
      tags: [感知层]
      responses:
        '200':
          description: 位置语义
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationSemantics'

  /perception/weather:
    get:
      summary: 获取当前天气
      description: 返回当前天气状况和情绪调制值
      operationId: getCurrentWeather
      tags: [感知层]
      responses:
        '200':
          description: 天气信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherInfo'

  /perception/gesture:
    post:
      summary: 注册手势事件
      description: 检测到手势时触发
      operationId: registerGesture
      tags: [感知层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gesture_type:
                  type: string
                  enum: [tap, shake, long_press, photo_share]
                intensity:
                  type: number
                  minimum: 0
                  maximum: 1
                duration_ms:
                  type: integer
      responses:
        '200':
          description: 手势处理结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestureResult'

  # ============================================================
  # 记忆层 (Memory Layer)
  # ============================================================

  /memory/short-term:
    get:
      summary: 获取短期记忆
      description: 返回当前短期记忆列表
      operationId: getShortTermMemory
      tags: [记忆层]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 短期记忆列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemoryFragment'

  /memory/long-term:
    get:
      summary: 查询长期记忆
      description: 按条件查询长期记忆
      operationId: queryLongTermMemory
      tags: [记忆层]
      parameters:
        - name: emotion
          in: query
          schema:
            type: string
            enum: [joy, sadness, calm, excitement, nostalgia, anxiety, love, loneliness, curiosity, melancholy]
        - name: source
          in: query
          schema:
            type: string
            enum: [photo, location, conversation, weather, time, gesture, silence]
        - name: min_importance
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 匹配的记忆列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemoryFragment'

  /memory/store:
    post:
      summary: 存储记忆
      description: 将新的记忆片段存入短期记忆
      operationId: storeMemory
      tags: [记忆层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryFragment'
      responses:
        '201':
          description: 存储成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  stored:
                    type: boolean

  /memory/distill:
    post:
      summary: 触发蒸馏
      description: 手动触发记忆蒸馏过程
      operationId: triggerDistillation
      tags: [记忆层]
      responses:
        '200':
          description: 蒸馏结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  distilled_count:
                    type: integer
                  remaining_short_term:
                    type: integer
                  total_long_term:
                    type: integer

  /memory/forget:
    post:
      summary: 触发遗忘
      description: 手动触发遗忘过程
      operationId: triggerForgetting
      tags: [记忆层]
      responses:
        '200':
          description: 遗忘结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  forgotten_count:
                    type: integer
                  remaining_long_term:
                    type: integer

  # ============================================================
  # 情绪层 (Emotion Layer)
  # ============================================================

  /emotion/current:
    get:
      summary: 获取当前情绪
      description: 返回当前情绪状态
      operationId: getCurrentEmotion
      tags: [情绪层]
      responses:
        '200':
          description: 当前情绪状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmotionState'

  /emotion/predict:
    get:
      summary: 情绪预测
      description: 预测未来一段时间的情绪走势
      operationId: predictEmotion
      tags: [情绪层]
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 3
          description: 预测未来几小时
      responses:
        '200':
          description: 情绪预测
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    hour:
                      type: integer
                    predicted_value:
                      type: number
                    confidence:
                      type: number

  /emotion/modulate:
    post:
      summary: 情绪调制
      description: 应用调制因子到当前情绪
      operationId: modulateEmotion
      tags: [情绪层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                factor_type:
                  type: string
                  enum: [weather, season, interaction, special_date]
                value:
                  type: number
                  minimum: -5
                  maximum: 5
      responses:
        '200':
          description: 调制结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmotionState'

  /emotion/history:
    get:
      summary: 情绪历史
      description: 获取过去一段时间的情绪历史
      operationId: getEmotionHistory
      tags: [情绪层]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        '200':
          description: 情绪历史
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timestamp:
                      type: string
                      format: date-time
                    value:
                      type: number
                    trigger:
                      type: string

  # ============================================================
  # 表达层 (Expression Layer)
  # ============================================================

  /expression/poem:
    post:
      summary: 生成诗歌
      description: 基于当前感知、记忆、情绪生成诗歌
      operationId: generatePoem
      tags: [表达层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger:
                  type: string
                  enum: [photo, location, weather, time, emotion, memory, user_request]
                  description: 触发来源
                context:
                  type: object
                  description: 触发上下文（如照片分析结果）
                form:
                  type: string
                  enum: [free_verse, haiku, short_poem, micro_story]
                  default: free_verse
                  description: 诗歌形式
      responses:
        '200':
          description: 生成的诗歌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poem'

  /expression/voice:
    post:
      summary: 语音合成
      description: 将诗歌转换为语音
      operationId: synthesizeVoice
      tags: [表达层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                voice_params:
                  $ref: '#/components/schemas/VoiceParams'
      responses:
        '200':
          description: 语音数据
          content:
            audio/wav:
              schema:
                type: string
                format: binary

  /expression/ui:
    get:
      summary: 获取UI渲染参数
      description: 根据当前状态返回UI渲染参数
      operationId: getUIRenderParams
      tags: [表达层]
      responses:
        '200':
          description: UI渲染参数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UIRenderParams'

  /expression/response:
    post:
      summary: 生成对话回应
      description: 基于用户输入生成诗人回应
      operationId: generateResponse
      tags: [表达层]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_input:
                  type: string
                input_type:
                  type: string
                  enum: [text, voice, gesture, silence]
      responses:
        '200':
          description: 诗人的回应
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                  emotion:
                    type: string
                  should_speak:
                    type: boolean
                    description: 是否应该开口（沉默也是一种回应）

  # ============================================================
  # 生命周期管理
  # ============================================================

  /system/init:
    post:
      summary: 初始化诗人
      description: 创建新的诗人实例
      operationId: initPoet
      tags: [系统]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                soul_config:
                  $ref: '#/components/schemas/SoulConfig'
                voice_config:
                  $ref: '#/components/schemas/VoiceConfig'
      responses:
        '201':
          description: 初始化成功

  /system/status:
    get:
      summary: 系统状态
      description: 返回诗人系统的当前状态
      operationId: getSystemStatus
      tags: [系统]
      responses:
        '200':
          description: 系统状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'

  /system/sleep:
    post:
      summary: 休眠
      description: 将诗人置于休眠状态
      operationId: sleepPoet
      tags: [系统]
      responses:
        '200':
          description: 休眠成功

  /system/wake:
    post:
      summary: 唤醒
      description: 唤醒诗人
      operationId: wakePoet
      tags: [系统]
      responses:
        '200':
          description: 唤醒成功

# ============================================================
# 数据模型定义
# ============================================================

components:
  schemas:
    PerceptionState:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        photo:
          type: object
          properties:
            last_scene:
              type: string
            last_face_count:
              type: integer
            last_dominant_color:
              type: string
        location:
          type: object
          properties:
            semantic:
              type: string
            is_new:
              type: boolean
            stay_duration_min:
              type: integer
        weather:
          type: object
          properties:
            condition:
              type: string
            temperature:
              type: number
            humidity:
              type: number
        light:
          type: object
          properties:
            level:
              type: string
              enum: [bright, moderate, dim, dark]
            lux:
              type: number
        device:
          type: object
          properties:
            orientation:
              type: string
              enum: [portrait, landscape, flat, pocket]
            battery_level:
              type: integer

    PhotoAnalysis:
      type: object
      properties:
        scene:
          type: string
        dominant_color:
          type: string
        brightness:
          type: number
        face_count:
          type: integer
        composition:
          type: string
          enum: [centered, rule_of_thirds, minimal, dense]
        emotion_hint:
          type: string
        timestamp:
          type: string
          format: date-time

    LocationSemantics:
      type: object
      properties:
        semantic:
          type: string
          description: 语义标签（家/公司/咖啡店等）
        is_new:
          type: boolean
        is_frequent:
          type: boolean
        stay_duration_min:
          type: integer
        distance_from_home_km:
          type: number

    WeatherInfo:
      type: object
      properties:
        condition:
          type: string
          enum: [sunny, cloudy, overcast, light_rain, heavy_rain, snow, fog, storm]
        temperature:
          type: number
        humidity:
          type: number
        emotion_modulation:
          type: number
          minimum: -5
          maximum: 5
        is_first_snow:
          type: boolean

    GestureResult:
      type: object
      properties:
        handled:
          type: boolean
        emotion_change:
          type: number
        response_type:
          type: string
          enum: [verpoem, silent, animation, none]

    MemoryFragment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        source:
          type: string
          enum: [photo, location, conversation, weather, time, gesture, silence]
        emotion:
          type: string
          enum: [joy, sadness, calm, excitement, nostalgia, anxiety, love, loneliness, curiosity, melancholy]
        intensity:
          type: number
          minimum: 0
          maximum: 1
        timestamp:
          type: string
          format: date-time
        importance:
          type: number
          minimum: 0
          maximum: 1
        access_count:
          type: integer

    EmotionState:
      type: object
      properties:
        value:
          type: number
          minimum: 1
          maximum: 10
        primary_emotion:
          type: string
          enum: [joy, sadness, calm, excitement, nostalgia, anxiety, love, loneliness, curiosity, melancholy]
        secondary_emotion:
          type: string
        modulation_factors:
          type: object
          properties:
            weather:
              type: number
            season:
              type: number
            interaction:
              type: number
            special_date:
              type: number
        timestamp:
          type: string
          format: date-time

    Poem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        lines:
          type: integer
        form:
          type: string
          enum: [free_verse, haiku, short_poem, micro_story]
        trigger:
          type: string
        emotion_at_creation:
          type: string
        timestamp:
          type: string
          format: date-time

    VoiceParams:
      type: object
      properties:
        timbre:
          type: string
          enum: [warm_husky, clear_bright, deep_magnetic, cool_distant, soft_round, youthful]
        tone:
          type: string
          enum: [light, steady, gentle, serious, playful, low, excited]
        soul_base:
          type: string
          enum: [optimistic, contemplative, passionate, restrained, romantic, rational]

    UIRenderParams:
      type: object
      properties:
        time_period:
          type: string
          enum: [morning, noon, dusk, night]
        primary_color:
          type: string
        secondary_color:
          type: string
        text_color:
          type: string
        light_intensity:
          type: number
        animation_speed:
          type: string
          enum: [slow, normal, fast]
        weather_overlay:
          type: string
          nullable: true
        poet_size_ratio:
          type: number
        breathing_cycle_sec:
          type: number

    SoulConfig:
      type: object
      properties:
        emotion_base:
          type: string
        expression_style:
          type: string
        core_drive:
          type: string
        combination_id:
          type: string
          description: 如 "contemplative-restrained-keen"

    VoiceConfig:
      type: object
      properties:
        timbre:
          type: string
        tone:
          type: string
        soul_base:
          type: string

    SystemStatus:
      type: object
      properties:
        state:
          type: string
          enum: [active, sleeping, initializing]
        lifecycle_phase:
          type: string
          enum: [newborn, familiar, intimate, farewell]
        days_since_init:
          type: integer
        short_term_count:
          type: integer
        long_term_count:
          type: integer
        current_emotion_value:
          type: number
        last_interaction:
          type: string
          format: date-time
        storage_used_mb:
          type: number
